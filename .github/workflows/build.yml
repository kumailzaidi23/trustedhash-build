name: Build trustedhash leak module

on:
  workflow_dispatch:
    inputs:
      kver:
        description: "VM uname -r"
        required: true
        default: "7.0.14"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build signed module
        run: |
          set -euxo pipefail

          cat > trustedhash_exploit_v2/ci_build.sh <<'BASH'
          #!/usr/bin/env bash
          set -euxo pipefail
          : "${KVER:=7.0.14}"

          cd /work/trustedhash_exploit_v2

          cat > /tmp/th_leak_build.nix <<'NIX'
          let
            flake = builtins.getFlake "path:/tmp/trusted-hash/challenge";
            pkgs = import flake.inputs.nixpkgs { system = "x86_64-linux"; };
            linuxPkg = pkgs.linuxPackages_7_0;
            kernel = linuxPkg.kernel;
          in
          kernel.stdenv.mkDerivation {
            pname = "th_leak";
            version = "1.0";
            src = /work/trustedhash_exploit_v2;

            nativeBuildInputs = kernel.moduleBuildDependencies;

            makeFlags = linuxPkg.kernelModuleMakeFlags ++ [
              "KDIR=${kernel.dev}/lib/modules/${kernel.modDirVersion}/build"
            ];

            installPhase = ''
              mkdir -p $out
              cp th_leak.ko $out/th_leak.ko
            '';
          }
          NIX

          cat > /tmp/sign_file_path.nix <<'NIX'
          let
            flake = builtins.getFlake "path:/tmp/trusted-hash/challenge";
            pkgs = import flake.inputs.nixpkgs { system = "x86_64-linux"; };
            linuxPkg = pkgs.linuxPackages_7_0;
            kernel = linuxPkg.kernel;
          in
          "${kernel.dev}/lib/modules/${kernel.modDirVersion}/build/scripts/sign-file"
          NIX

          cat > /tmp/modver.nix <<'NIX'
          let
            flake = builtins.getFlake "path:/tmp/trusted-hash/challenge";
            pkgs = import flake.inputs.nixpkgs { system = "x86_64-linux"; };
            linuxPkg = pkgs.linuxPackages_7_0;
            kernel = linuxPkg.kernel;
          in
          kernel.modDirVersion
          NIX

          MODVER="$(nix --extra-experimental-features "nix-command flakes" eval --raw --impure --expr "$(cat /tmp/modver.nix)")"
          echo "kernel modDirVersion from dev image: $MODVER"
          test "$MODVER" = "$KVER"

          nix --extra-experimental-features "nix-command flakes" \
            build --impure --expr "$(cat /tmp/th_leak_build.nix)" \
            --out-link /tmp/th_leak_out

          cp -L /tmp/th_leak_out/th_leak.ko /work/trustedhash_exploit_v2/th_leak.ko

          SIGN_FILE="$(nix --extra-experimental-features "nix-command flakes" eval --raw --impure --expr "$(cat /tmp/sign_file_path.nix)")"
          test -x "$SIGN_FILE"
          test -f /opt/trusted-hash-dev-keys/module-signing/module-signing.key
          test -f /opt/trusted-hash-dev-keys/module-signing/module-signing.pem

          "$SIGN_FILE" sha512 \
            /opt/trusted-hash-dev-keys/module-signing/module-signing.key \
            /opt/trusted-hash-dev-keys/module-signing/module-signing.pem \
            /work/trustedhash_exploit_v2/th_leak.ko

          ls -la /work/trustedhash_exploit_v2/th_leak.ko
          BASH

          chmod +x trustedhash_exploit_v2/ci_build.sh

          docker pull dongruixuan/trustedhash-devenv:latest
          docker run --rm \
            -e KVER="${{ inputs.kver }}" \
            -v "$PWD:/work" \
            dongruixuan/trustedhash-devenv:latest \
            bash /work/trustedhash_exploit_v2/ci_build.sh

          test -f trustedhash_exploit_v2/th_leak.ko
          ls -la trustedhash_exploit_v2/th_leak.ko

      - name: Upload th_leak.ko
        uses: actions/upload-artifact@v4
        with:
          name: th_leak-ko
          path: trustedhash_exploit_v2/th_leak.ko
