name: Build trustedhash leak module

on:
  workflow_dispatch:
    inputs:
      kver:
        description: "VM uname -r"
        required: true
        default: "7.0.14"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build and sign th_leak.ko
        run: |
          set -euxo pipefail

          cat > trustedhash_exploit_v2/ci_build_inside.sh <<'BASH'
          #!/usr/bin/env bash
          set -euxo pipefail

          cd /work/trustedhash_exploit_v2

          KEY="/opt/trusted-hash-dev-keys/module-signing/module-signing.key"
          CERT="/opt/trusted-hash-dev-keys/module-signing/module-signing.pem"

          test -f "$KEY"
          test -f "$CERT"

          echo "[*] candidate kernel build dirs:"
          find /nix/store -path "*/lib/modules/${KVER}/build" -type d -print | sort

          KDIR="$(
            find /nix/store -path "*/lib/modules/${KVER}/build" -type d -print \
              | sort \
              | while read -r d; do
                  if [ -x "$d/scripts/sign-file" ]; then
                    echo "$d"
                    break
                  fi
                done
          )"

          if [ -z "$KDIR" ]; then
            KDIR="$(find /nix/store -path "*/lib/modules/${KVER}/build" -type d -print | sort | head -n1)"
          fi

          test -n "$KDIR"
          test -d "$KDIR"

          echo "[+] using KDIR=$KDIR"
          ls -la "$KDIR/scripts/sign-file" || true

          rm -f th_leak.o th_leak.ko th_leak.mod th_leak.mod.c Module.symvers modules.order .*.cmd

          make -C "$KDIR" M="$PWD" modules

          SIGN_FILE="$KDIR/scripts/sign-file"

          if [ ! -x "$SIGN_FILE" ]; then
            test -f "$SIGN_FILE"
            cp "$SIGN_FILE" /tmp/sign-file
            chmod +x /tmp/sign-file
            SIGN_FILE="/tmp/sign-file"
          fi

          "$SIGN_FILE" sha512 "$KEY" "$CERT" th_leak.ko

          ls -la th_leak.ko
          modinfo th_leak.ko | sed -n '/^signer:/p;/^sig_key:/p;/^vermagic:/p'
          BASH

          chmod +x trustedhash_exploit_v2/ci_build_inside.sh

          docker pull dongruixuan/trustedhash-devenv:latest

          docker run --rm \
            -e KVER="${{ inputs.kver }}" \
            -v "$PWD:/work" \
            -w /work/trustedhash_exploit_v2 \
            dongruixuan/trustedhash-devenv:latest \
            bash -lc '
              set -euxo pipefail
              nix --extra-experimental-features "nix-command flakes" shell \
                nixpkgs#gnumake \
                nixpkgs#gcc \
                nixpkgs#binutils \
                nixpkgs#perl \
                nixpkgs#bc \
                nixpkgs#openssl \
                nixpkgs#kmod \
                nixpkgs#gnused \
                nixpkgs#gawk \
                nixpkgs#gnugrep \
                nixpkgs#coreutils \
                nixpkgs#findutils \
                -c bash /work/trustedhash_exploit_v2/ci_build_inside.sh
            '

          test -f trustedhash_exploit_v2/th_leak.ko
          ls -la trustedhash_exploit_v2/th_leak.ko

      - name: Upload th_leak.ko
        uses: actions/upload-artifact@v4
        with:
          name: th_leak-ko
          path: trustedhash_exploit_v2/th_leak.ko
