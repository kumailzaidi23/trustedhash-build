name: Build trustedhash leak module

on:
  workflow_dispatch:
    inputs:
      kver:
        description: "VM uname -r"
        required: true
        default: "7.0.14"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build signed kernel module inside Docker
        run: |
          set -euxo pipefail
          docker pull dongruixuan/trustedhash-devenv:latest
          docker run --rm \
            -v "$PWD:/work" \
            -w /work/trustedhash_exploit_v2 \
            dongruixuan/trustedhash-devenv:latest \
            bash -lc 'set -euxo pipefail; pwd; ls -la; bash ./build_signed_ko.sh "${{ inputs.kver }}"; ls -la; find /work -name "*.ko" -ls'
          test -f trustedhash_exploit_v2/th_leak.ko
          ls -la trustedhash_exploit_v2/th_leak.ko

      - name: Upload th_leak.ko
        uses: actions/upload-artifact@v4
        with:
          name: th_leak-ko
          path: trustedhash_exploit_v2/th_leak.ko
