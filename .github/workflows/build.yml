name: Build trustedhash leak module

on:
  workflow_dispatch:
    inputs:
      kver:
        description: "VM uname -r"
        required: true
        default: "7.0.14"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Pull dev image
        run: docker pull dongruixuan/trustedhash-devenv:latest

      - name: Build signed kernel module inside Docker
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work/trustedhash_exploit_v2 \
            dongruixuan/trustedhash-devenv:latest \
            bash -lc 'bash ./build_signed_ko.sh "${{ inputs.kver }}"; ls -la'

      - name: Upload th_leak.ko
        uses: actions/upload-artifact@v4
        with:
          name: th_leak-ko
          path: trustedhash_exploit_v2/th_leak.ko
