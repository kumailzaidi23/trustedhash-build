
name: Build trustedhash leak module

on:
  workflow_dispatch:
    inputs:
      kver:
        description: "VM uname -r"
        required: true
        default: "7.0.14"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build and sign th_leak.ko
        run: |
          set -euxo pipefail

          docker pull dongruixuan/trustedhash-devenv:latest

          docker run --rm \
            -v "$PWD:/work" \
            dongruixuan/trustedhash-devenv:latest \
            bash -lc '
              set -euxo pipefail

              cat > /tmp/build-leak.sh <<'"'"'EOS'"'"'
#!/usr/bin/env bash
set -euxo pipefail

KVER="${1:-7.0.14}"
WORKDIR="/work/trustedhash_exploit_v2"
KEY="/opt/trusted-hash-dev-keys/module-signing/module-signing.key"
CERT="/opt/trusted-hash-dev-keys/module-signing/module-signing.pem"

cd "$WORKDIR"

KDIR="$(find /nix/store -path "*/lib/modules/${KVER}/build" -type d -print -quit)"
test -n "$KDIR"
test -d "$KDIR"
test -f "$KEY"
test -f "$CERT"
test -x "$KDIR/scripts/sign-file"

echo "[+] KDIR=$KDIR"
echo "[+] KEY=$KEY"
echo "[+] CERT=$CERT"

rm -f th_leak.o th_leak.ko th_leak.mod th_leak.mod.c Module.symvers modules.order .*.cmd

make -C "$KDIR" M="$PWD" ARCH=x86 modules

"$KDIR/scripts/sign-file" sha512 "$KEY" "$CERT" th_leak.ko

ls -la th_leak.ko
file th_leak.ko
EOS

              chmod +x /tmp/build-leak.sh

              nix --extra-experimental-features "nix-command flakes" \
                develop /tmp/trusted-hash/challenge#kernel \
                --command /tmp/build-leak.sh "7.0.14"
            '

          test -f trustedhash_exploit_v2/th_leak.ko
          ls -la trustedhash_exploit_v2/th_leak.ko

      - name: Upload th_leak.ko
        uses: actions/upload-artifact@v4
        with:
          name: th_leak-ko
          path: trustedhash_exploit_v2/th_leak.ko
